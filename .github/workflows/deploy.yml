name: Build and push Docker image

on:
  push:
    tags:
      - 'v*'

env:
  AWS_REGION: us-west-2
  REPO_NAME: adapters/gworkspace-mcp-server
  PLATFORM: linux/arm64

jobs:
  build-push-ecr:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-PushGWorkspaceRemote

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository URI
        id: ecr-repo
        run: |
          ECR_URI="${{ steps.login-ecr.outputs.registry }}/${{ env.REPO_NAME }}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORM }}
          push: true
          tags: ${{ steps.ecr-repo.outputs.ecr_uri }}:${{ steps.version.outputs.version }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
